# ============================================================
# Living Room LED Strip ESPHome Configuration
# Chip: ESP32 | Flash: 4MB
# WS2811 12V LED Strip=GPIO16, num_leds=60
# MQTT: emqx.eyefang.com:1883
# ============================================================

esphome:
  name: living-room-strip
  friendly_name: Living Room Strip
  on_boot:
    - priority: 600
      then:
        - light.turn_off: led_strip

esp32:
  board: esp32dev
  framework:
    type: esp-idf
  flash_size: 4MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "LivingRoomStrip"
    password: "12345678"

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

mqtt:
  broker: emqx.eyefang.com
  port: 1883
  username: admin
  password: admin
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: living-room-strip
  birth_message:
    topic: living-room-strip/status
    payload: online
  will_message:
    topic: living-room-strip/status
    payload: offline
  id: mqtt_client
  on_message:
    - topic: living-room-strip/strip/set
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - light.turn_on: led_strip
            else:
              - light.turn_off: led_strip
    - topic: living-room-strip/strip/toggle
      then:
        - light.toggle: led_strip
    - topic: living-room-strip/brightness/set
      then:
        - lambda: |-
            int b = atoi(x.c_str());
            auto call = id(led_strip).turn_on();
            call.set_brightness(b / 100.0f);
            call.perform();

logger:
  level: INFO

# ====== WS2811 12V LED Strip ======
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO16
    num_leds: 60
    chipset: ws2812
    name: "L1-LED Strip"
    id: led_strip
    default_transition_length: 500ms
    restore_mode: ALWAYS_OFF
    effects:
      - addressable_rainbow:
          name: "Rainbow"
      - addressable_color_wipe:
          name: "Color Wipe"
      - addressable_scan:
          name: "Scan"
      - addressable_twinkle:
          name: "Twinkle"
      - addressable_random_twinkle:
          name: "Random Twinkle"
      - addressable_fireworks:
          name: "Fireworks"
      - addressable_flicker:
          name: "Flicker"
      - pulse:
          name: "Fast Pulse"
      - pulse:
          name: "Slow Pulse"
          transition_length: 1s
          update_interval: 2s

switch:
  - platform: restart
    name: "Restart Device"
  - platform: safe_mode
    name: "Safe Mode"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    update_interval: 60s