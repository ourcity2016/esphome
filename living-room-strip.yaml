# ============================================================
# Living Room LED Strip ESPHome Configuration
# Chip: ESP32 | Flash: 4MB
# WS2811 12V LED Strip=GPIO16, num_leds=90
# MQTT: emqx.eyefang.com:1883
# 框架: Arduino (FastLED)
# ============================================================

esphome:
  name: living-room-strip
  friendly_name: Living Room Strip
  on_boot:
    - priority: 600
      then:
        - light.turn_off: led_strip

esp32:
  board: esp32dev
  framework:
    type: arduino
  flash_size: 4MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "LivingRoomStrip"
    password: "12345678"

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

# ====== OTA ======
ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

mqtt:
  broker: emqx.eyefang.com
  port: 1883
  username: admin
  password: admin
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: living-room-strip
  birth_message:
    topic: living-room-strip/status
    payload: online
  will_message:
    topic: living-room-strip/status
    payload: offline
  id: mqtt_client
  on_message:
    - topic: living-room-strip/strip/set
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - light.turn_on: led_strip
            else:
              - light.turn_off: led_strip
    - topic: living-room-strip/strip/toggle
      then:
        - light.toggle: led_strip

web_server:
  port: 80

logger:
  level: INFO

# ====== WS2811 12V LED Strip ======
light:
  - platform: fastled_clockless
    chipset: WS2811
    pin: GPIO16
    num_leds: 90
    rgb_order: RGB
    max_refresh_rate: 20ms
    default_transition_length: 0ms
    restore_mode: ALWAYS_OFF
    name: "L1-LED Strip"
    id: led_strip
    effects:
      - addressable_rainbow:
          name: "Rainbow"
      - addressable_color_wipe:
          name: "Color Wipe"
      - addressable_scan:
          name: "Scan"
      - addressable_twinkle:
          name: "Twinkle"
      - pulse:
          name: "Pulse"

switch:
  - platform: restart
    name: "S1-Restart Device"
  - platform: safe_mode
    name: "S2-Safe Mode"

sensor:
  - platform: wifi_signal
    name: "T1-WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "T2-Uptime"
    update_interval: 60s

text_sensor:
  - platform: template
    name: "T3-LED Status"
    lambda: |-
      return id(led_strip).remote_values.is_on() ? "ON" : "OFF";
    update_interval: 1s