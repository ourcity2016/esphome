# ============================================================
# Study Room ESPHome Configuration - NOMI Eyes Edition
# Chip: ESP32 | Display: SH1106 128x64 I2C | Flash: 16MB
# Pins: SCK=22, SDA=21, Prev=14, Next=13, Confirm=12
# Study Light Switch=16(自锁型), Light Out=17, Dining Out=25, Curtain=32
# MQTT: emqx.eyefang.com:1883
# 动画逻辑: 每3秒眨眼, 每5秒随机表情(1:1还原HTML模拟器)
# 继电器: 低电平触发(inverted: true)
# ============================================================

esphome:
  name: study-room
  friendly_name: Study Room
  on_boot:
    - priority: 600
      then:
        - output.turn_off: study_light_output
        - output.turn_off: dining_light_output
    - priority: 100
      then:
        - delay: 300ms
        - light.turn_off: study_light
        - light.turn_off: dining_light
    - priority: -100
      then:
        - delay: 800ms
        - if:
            condition:
              lambda: 'return id(study_light).remote_values.is_on();'
            then:
              - light.turn_off: study_light
        - if:
            condition:
              lambda: 'return id(dining_light).remote_values.is_on();'
            then:
              - light.turn_off: dining_light
        - lambda: |-
            id(display_sleeping) = false;
            id(last_activity) = millis();

esp32:
  board: esp32dev
  framework:
    type: esp-idf
  flash_size: 16MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "StudyRoom"
    password: "12345678"

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

mqtt:
  broker: emqx.eyefang.com
  port: 1883
  username: admin
  password: admin
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: study-room
  birth_message:
    topic: study-room/status
    payload: online
  will_message:
    topic: study-room/status
    payload: offline

web_server:
  port: 80

logger:
  level: INFO

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

font:
  - file:
      type: gfonts
      family: Roboto
      weight: regular
    id: font_title
    size: 12
  - file:
      type: gfonts
      family: Roboto
      weight: regular
    id: font_normal
    size: 10
  - file:
      type: gfonts
      family: Roboto
      weight: regular
    id: font_small
    size: 8

# ====== Globals ======
globals:
  - id: eye_state
    type: int
    restore_value: false
    initial_value: '0'

  - id: eye_anim_frame
    type: int
    restore_value: false
    initial_value: '0'

  - id: auto_anim_timer
    type: unsigned long
    restore_value: false
    initial_value: '0'

  - id: current_page
    type: int
    restore_value: true
    initial_value: '0'

  - id: last_activity
    type: unsigned long
    restore_value: false
    initial_value: '0'

  - id: screen_locked
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: hand_roll_enabled
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: lcd_sleep_enabled
    type: bool
    restore_value: true
    initial_value: 'true'

  - id: lcd_sleep_interval
    type: unsigned long
    restore_value: false
    initial_value: '60000'

  - id: display_sleeping
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: total_pages
    type: int
    restore_value: false
    initial_value: '5'

  - id: boot_complete
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: auto_anim_state
    type: int
    restore_value: false
    initial_value: '0'

  - id: next_auto_event
    type: unsigned long
    restore_value: false
    initial_value: '0'

  - id: auto_anim_start_time
    type: unsigned long
    restore_value: false
    initial_value: '0'

# ====== Outputs (低电平触发, inverted: true) ======
output:
  - platform: gpio
    pin: GPIO17
    id: study_light_output
    inverted: true

  - platform: gpio
    pin: GPIO25
    id: dining_light_output
    inverted: true

# ====== Lights ======
light:
  - platform: binary
    name: "L1-Study Light"
    id: study_light
    output: study_light_output
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }
    on_turn_off:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }

  - platform: binary
    name: "L2-Dining Light"
    id: dining_light
    output: dining_light_output
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }
    on_turn_off:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }

# ====== Switches ======
switch:
  - platform: gpio
    name: "S1-Study Curtain"
    pin: GPIO32
    id: curtain_switch
    icon: "mdi:curtains"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }
    on_turn_off:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }

  - platform: restart
    name: "S2-Restart Device"
    id: device_restart

  - platform: safe_mode
    name: "S3-Safe Mode"

# ====== Buttons (自恢复型按键 + 自锁型开关) ======
binary_sensor:
  # 自恢复型：翻页按键
  - platform: gpio
    id: btn_next
    pin:
      number: GPIO13
      mode:
        input: true
        pulldown: true
    name: "B1-Next Page"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - lambda: |-
            if (!id(boot_complete)) return;
            if (id(screen_locked)) return;
            id(current_page) = (id(current_page) + 1) % id(total_pages);
            id(last_activity) = millis();
            if (id(display_sleeping)) id(display_sleeping) = false;
            id(oled_display).update();

  # 自恢复型：翻页按键
  - platform: gpio
    id: btn_prev
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true
    name: "B2-Prev Page"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - lambda: |-
            if (!id(boot_complete)) return;
            if (id(screen_locked)) return;
            id(current_page) = (id(current_page) - 1 + id(total_pages)) % id(total_pages);
            id(last_activity) = millis();
            if (id(display_sleeping)) id(display_sleeping) = false;
            id(oled_display).update();

  # 自锁型：书房灯物理开关 (GPIO16)
  # 按下导通 = 开灯，弹起断开 = 关灯
  - platform: gpio
    id: study_light_physical_switch
    pin:
      number: GPIO16
      mode:
        input: true
        pulldown: true
    name: "B3-Study Light Switch"
    filters:
      - delayed_on: 80ms
      - delayed_off: 80ms
    on_state:
      then:
        - if:
            condition:
              lambda: 'return id(boot_complete);'
            then:
              - if:
                  condition:
                    binary_sensor.is_on: study_light_physical_switch
                  then:
                    - light.turn_on: study_light
                    - lambda: |-
                        id(last_activity) = millis();
                        if (id(display_sleeping)) {
                          id(display_sleeping) = false;
                          id(oled_display).update();
                        }
                  else:
                    - light.turn_off: study_light
                    - lambda: |-
                        id(last_activity) = millis();
                        if (id(display_sleeping)) {
                          id(display_sleeping) = false;
                          id(oled_display).update();
                        }

  # 自恢复型：确认按键
  - platform: gpio
    id: btn_confirm
    pin:
      number: GPIO12
      mode:
        input: true
        pulldown: true
    name: "B4-Confirm"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_click:
      - min_length: 0ms
        max_length: 5000ms
        then:
          - lambda: |-
              if (!id(boot_complete)) return;
              if (id(screen_locked)) {
                id(last_activity) = millis();
                if (id(display_sleeping)) {
                  id(display_sleeping) = false;
                  id(oled_display).update();
                }
                return;
              }
              id(last_activity) = millis();
              if (id(display_sleeping)) {
                id(display_sleeping) = false;
                id(oled_display).update();
                return;
              }
              switch (id(current_page)) {
                case 0: id(hand_roll_enabled) = !id(hand_roll_enabled); break;
                case 1: id(study_light).toggle().perform(); id(eye_state) = id(study_light).remote_values.is_on() ? 5 : 4; id(eye_anim_frame) = 0; break;
                case 2: id(dining_light).toggle().perform(); break;
                case 3: id(curtain_switch).toggle(); break;
                case 4: break;
              }
              id(oled_display).update();
      - min_length: 5000ms
        max_length: 10000ms
        then:
          - lambda: |-
              id(screen_locked) = !id(screen_locked);
              id(last_activity) = millis();
              if (id(display_sleeping)) id(display_sleeping) = false;
              id(oled_display).update();
      - min_length: 10000ms
        max_length: 20000ms
        then:
          - switch.toggle: device_restart

# ====== Timers ======
interval:
  - interval: 2000ms
    then:
      - lambda: |-
          if (!id(boot_complete)) {
            id(boot_complete) = true;
            id(study_light).turn_off().perform();
            id(dining_light).turn_off().perform();
            id(next_auto_event) = millis() + 2000;
            id(auto_anim_state) = 0;
          }

  - interval: 16ms
    then:
      - lambda: |-
          if (!id(boot_complete)) return;
          if (id(screen_locked)) return;
          if (id(display_sleeping)) return;
          if (id(current_page) != 0) return;
          
          unsigned long now = millis();
          id(auto_anim_timer) += 16;
          
          if (id(eye_state) == 0 && id(auto_anim_state) == 0) {
            if (now >= id(next_auto_event)) {
              if (id(auto_anim_timer) % 3000 < 16) {
                id(eye_state) = 1;
                id(eye_anim_frame) = 0;
                id(auto_anim_state) = 1;
                id(auto_anim_start_time) = now;
              }
            }
          }
          
          if (id(eye_state) == 0 && id(auto_anim_state) == 0) {
            if (now >= id(next_auto_event)) {
              if (id(auto_anim_timer) % 5000 < 16) {
                int r = esp_random() % 100;
                if (r < 30) { id(eye_state) = 2; }
                else if (r < 55) { id(eye_state) = 3; }
                else if (r < 70) { id(eye_state) = 4; }
                else if (r < 80) { id(eye_state) = 5; }
                else if (r < 90) { id(eye_state) = 6; }
                
                if (id(eye_state) != 0) {
                  id(eye_anim_frame) = 0;
                  id(auto_anim_state) = 2;
                  id(auto_anim_start_time) = now;
                }
              }
            }
          }
          
          if (id(auto_anim_state) > 0) { id(eye_anim_frame) += 1; }
          
          if (id(eye_state) > 1 && id(eye_anim_frame) > 20) {
            id(eye_state) = 0; id(eye_anim_frame) = 0;
            id(auto_anim_state) = 0;
            id(next_auto_event) = now + 2000 + (esp_random() % 3000);
          }
          
          if (id(eye_state) == 1 && id(eye_anim_frame) > 6) {
            id(eye_state) = 0; id(eye_anim_frame) = 0;
            id(auto_anim_state) = 0;
            id(next_auto_event) = now + 1000 + (esp_random() % 2000);
          }
          
          id(oled_display).update();

  - interval: 1s
    then:
      - lambda: |-
          if (id(lcd_sleep_enabled) && !id(screen_locked) && !id(display_sleeping)) {
            if (millis() - id(last_activity) > id(lcd_sleep_interval)) {
              id(display_sleeping) = true;
              id(oled_display).update();
            }
          }

# ====== Sensors ======
sensor:
  - platform: wifi_signal
    name: "T1-WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "T2-Uptime"
    update_interval: 60s

# ====== Text Sensors ======
text_sensor:
  - platform: mqtt_subscribe
    name: "AI Message"
    id: mqtt_ai_message
    topic: study-room/ai-message
    on_value:
      then:
        - lambda: |-
            id(last_activity) = millis();
            if (id(display_sleeping)) {
              id(display_sleeping) = false;
            }
            id(oled_display).update();

  - platform: template
    name: "T3-Current Page"
    id: current_page_name
    lambda: |-
      switch (id(current_page)) {
        case 0: return {"Home"};
        case 1: return {"Study Light"};
        case 2: return {"Dining Light"};
        case 3: return {"Curtain"};
        case 4: return {"Messages"};
        default: return {"Unknown"};
      }
    update_interval: 1s

  - platform: template
    name: "T5-Lock Status"
    id: lock_status
    lambda: |-
      return id(screen_locked) ? "Locked" : "Unlocked";
    update_interval: 1s

# ====== NOMI Eyes Display ======
display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled_display
    rotation: 0
    update_interval: never
    lambda: |-
      it.fill(COLOR_OFF);
      
      if (!id(boot_complete)) {
        it.print(64, 24, id(font_title), TextAlign::CENTER, "Starting...");
        it.print(64, 40, id(font_normal), TextAlign::CENTER, "Lights OFF");
        return;
      }
      
      if (id(display_sleeping)) { return; }
      
      if (id(screen_locked)) {
        it.print(64, 24, id(font_title), TextAlign::CENTER, "SCREEN LOCKED");
        it.print(64, 40, id(font_normal), TextAlign::CENTER, "Hold OK to unlock");
        return;
      }
      
      switch (id(current_page)) {
        case 0: {
          it.print(64, 10, id(font_title), TextAlign::CENTER, "Study Room");
          it.horizontal_line(0, 17, 128);
          
          int L_CX = 40, R_CX = 88, EYE_CY = 38;
          int EYE_R = 13, PUPIL_R = 5, IRIS_R = 7;
          int px = 0, py = 1, blink = 0, top_r = 13, bot_r = 13;
          
          switch (id(eye_state)) {
            case 0: px = 0; py = 1; blink = 0; top_r = 13; bot_r = 13; break;
            case 1: {
              int f = id(eye_anim_frame);
              if (f < 2) blink = f * 7;
              else if (f < 3) blink = 14;
              else if (f < 5) blink = 14 - (f - 2) * 7;
              else blink = 0;
              px = 0; py = 1; top_r = 13; bot_r = 13; break;
            }
            case 2: px = -5; py = 1; blink = 0; top_r = 13; bot_r = 13; break;
            case 3: px = 5; py = 1; blink = 0; top_r = 13; bot_r = 13; break;
            case 4: px = 0; py = 2; blink = 3; top_r = 10; bot_r = 5; break;
            case 5: px = 0; py = 0; blink = -2; top_r = 16; bot_r = 14; break;
            case 6: px = 0; py = 1; blink = 7; top_r = 6; bot_r = 11; break;
          }
          
          auto draw_nomi_eye = [&](int cx, int cy) {
            if (blink >= 24) { it.horizontal_line(cx - 12, cy, 24); return; }
            int t = blink > 0 ? top_r - blink : top_r; if (t < 0) t = 0;
            if (t > 0) for (int x = -EYE_R; x <= EYE_R; x++) {
              float ratio = (float)x / (float)EYE_R;
              float sq = 1.0f - ratio * ratio; if (sq < 0) sq = 0;
              int y_off = (int)((float)t * sqrtf(sq));
              for (int y = -y_off; y <= 0; y++) it.draw_pixel_at(cx + x, cy + y);
            }
            int b = (blink > 4) ? bot_r - (blink - 4) : bot_r; if (b < 0) b = 0;
            if (b > 0) for (int x = -EYE_R; x <= EYE_R; x++) {
              float ratio = (float)x / (float)EYE_R;
              float sq = 1.0f - ratio * ratio; if (sq < 0) sq = 0;
              int y_off = (int)((float)b * sqrtf(sq));
              for (int y = 0; y <= y_off; y++) it.draw_pixel_at(cx + x, cy + y);
            }
            if (blink < 16) {
              int ppx = cx + px, ppy = cy + py;
              it.filled_circle(ppx, ppy, IRIS_R);
              it.filled_circle(ppx, ppy, PUPIL_R);
              it.filled_circle(ppx, ppy, PUPIL_R - 2);
              it.draw_pixel_at(ppx - 2, ppy - 2);
              it.draw_pixel_at(ppx - 1, ppy - 3);
              it.draw_pixel_at(ppx + 1, ppy + 1);
            }
          };
          
          draw_nomi_eye(L_CX, EYE_CY);
          draw_nomi_eye(R_CX, EYE_CY);
          
          it.print(64, 58, id(font_small), TextAlign::CENTER, 
            id(hand_roll_enabled) ? "Manual | Press OK" : "Auto | Press OK");
          break;
        }
        
        case 1:
        case 2:
        case 3: {
          const char* title = "";
          const char* status = "";
          switch (id(current_page)) {
            case 1: title = "Study Light"; status = id(study_light).remote_values.is_on() ? "ON" : "OFF"; break;
            case 2: title = "Dining Light"; status = id(dining_light).remote_values.is_on() ? "ON" : "OFF"; break;
            case 3: title = "Curtain"; status = id(curtain_switch).state ? "OPEN" : "CLOSED"; break;
          }
          it.print(64, 10, id(font_title), TextAlign::CENTER, title);
          it.horizontal_line(0, 17, 128);
          it.print(64, 28, id(font_normal), TextAlign::CENTER, "Status:");
          it.print(64, 44, id(font_title), TextAlign::CENTER, status);
          it.filled_circle(64, 52, 3);
          it.print(64, 59, id(font_small), TextAlign::CENTER, "Press OK to toggle");
          break;
        }
        
        case 4: {
          it.print(64, 10, id(font_title), TextAlign::CENTER, "AI Message");
          it.horizontal_line(0, 17, 128);
          std::string msg = id(mqtt_ai_message).state;
          if (msg.length() > 0) {
            int y = 24, max_chars = 18;
            for (int i = 0; i < (int)msg.length() && y < 60; i += max_chars) {
              it.print(2, y, id(font_small), msg.substr(i, max_chars).c_str());
              y += 12;
            }
          } else {
            it.print(64, 36, id(font_normal), TextAlign::CENTER, "No messages");
          }
          break;
        }
      }
      
      it.printf(114, 58, id(font_small), TextAlign::CENTER, "%d/%d", id(current_page) + 1, id(total_pages));
      if (id(current_page) == 0 && id(hand_roll_enabled)) it.print(10, 10, id(font_small), TextAlign::CENTER, "M");