# ============================================================
# Master Bedroom Left Window ESPHome Configuration
# Chip: ESP32 | Flash: 4MB
# Pins:
#   UART0: 窗纱电机 RX=16, TX=17, Baud=9600
#   UART1: 窗帘电机 RX=22, TX=23, Baud=9600
# 485协议: STOP=0000020002, OFF=0000010001, ON=0000030003
# 循环逻辑: OFF→STOP→ON→STOP
# MQTT: emqx.eyefang.com:1883
# Home Assistant: 支持 Cover 实体
# ============================================================

esphome:
  name: master-bedroom-left-window
  friendly_name: Master Bedroom Left Window

esp32:
  board: esp32dev
  framework:
    type: esp-idf
  flash_size: 4MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "MBLeftWindow"
    password: "12345678"

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

mqtt:
  broker: emqx.eyefang.com
  port: 1883
  username: admin
  password: admin
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: master-bedroom-left-window
  birth_message:
    topic: master-bedroom-left-window/status
    payload: online
  will_message:
    topic: master-bedroom-left-window/status
    payload: offline
  id: mqtt_client
  on_message:
    - topic: master-bedroom-left-window/sheer/set
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - script.execute: sheer_open
        - if:
            condition:
              lambda: 'return x == "OFF";'
            then:
              - script.execute: sheer_close
        - if:
            condition:
              lambda: 'return x == "STOP";'
            then:
              - script.execute: sheer_stop
    - topic: master-bedroom-left-window/curtain/set
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - script.execute: curtain_open
        - if:
            condition:
              lambda: 'return x == "OFF";'
            then:
              - script.execute: curtain_close
        - if:
            condition:
              lambda: 'return x == "STOP";'
            then:
              - script.execute: curtain_stop
    - topic: master-bedroom-left-window/all/set
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - script.execute: sheer_open
              - script.execute: curtain_open
        - if:
            condition:
              lambda: 'return x == "OFF";'
            then:
              - script.execute: sheer_close
              - script.execute: curtain_close
        - if:
            condition:
              lambda: 'return x == "STOP";'
            then:
              - script.execute: sheer_stop
              - script.execute: curtain_stop
    - topic: master-bedroom-left-window/sheer/toggle
      then:
        - script.execute: sheer_toggle
    - topic: master-bedroom-left-window/curtain/toggle
      then:
        - script.execute: curtain_toggle
    - topic: master-bedroom-left-window/all/toggle
      then:
        - script.execute: sheer_toggle
        - script.execute: curtain_toggle

web_server:
  port: 80

logger:
  level: INFO

# ====== UART + RS485 方向控制 ======
uart:
  - id: uart_sheer
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600

  - id: uart_curtain
    tx_pin: GPIO23
    rx_pin: GPIO22
    baud_rate: 9600

# RS485 方向控制引脚 (DE/RE)
output:
  - platform: gpio
    pin: GPIO5
    id: rs485_de_sheer

  - platform: gpio
    pin: GPIO18
    id: rs485_de_curtain

# ====== Globals ======
globals:
  - id: sheer_state
    type: int
    restore_value: false
    initial_value: '1'
  - id: curtain_state
    type: int
    restore_value: false
    initial_value: '1'
  - id: sheer_step
    type: int
    restore_value: false
    initial_value: '0'
  - id: curtain_step
    type: int
    restore_value: false
    initial_value: '0'

# ====== Switch ======
switch:
  - platform: restart
    name: "S1-Restart Device"
    id: device_restart
  - platform: safe_mode
    name: "S2-Safe Mode"

# ====== Cover (HA 窗帘实体) ======
cover:
  - platform: template
    name: "C1-Sheer"
    id: sheer_cover
    device_class: curtain
    optimistic: true
    assumed_state: true
    open_action:
      - script.execute: sheer_open
    close_action:
      - script.execute: sheer_close
    stop_action:
      - script.execute: sheer_stop

  - platform: template
    name: "C2-Curtain"
    id: curtain_cover
    device_class: curtain
    optimistic: true
    assumed_state: true
    open_action:
      - script.execute: curtain_open
    close_action:
      - script.execute: curtain_close
    stop_action:
      - script.execute: curtain_stop

# ====== Sensors ======
sensor:
  - platform: wifi_signal
    name: "T1-WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "T2-Uptime"
    update_interval: 60s

# ====== Text Sensors ======
text_sensor:
  - platform: template
    name: "T3-Sheer State"
    id: sheer_status_text
    lambda: |-
      switch (id(sheer_state)) {
        case 1: return {"Stopped"};
        case 2: return {"Closed"};
        case 3: return {"Open"};
        default: return {"Unknown"};
      }
    update_interval: 1s
  - platform: template
    name: "T4-Curtain State"
    id: curtain_status_text
    lambda: |-
      switch (id(curtain_state)) {
        case 1: return {"Stopped"};
        case 2: return {"Closed"};
        case 3: return {"Open"};
        default: return {"Unknown"};
      }
    update_interval: 1s

# ====== Scripts (485写入: 拉高DE → 写数据 → 拉低DE) ======
script:
  - id: sheer_open
    then:
      - output.turn_on: rs485_de_sheer
      - delay: 5ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x03,0x00,0x03};
          id(uart_sheer).write_array(cmd, 6);
      - delay: 10ms
      - output.turn_off: rs485_de_sheer
      - lambda: |-
          id(sheer_state) = 3;
          id(mqtt_client).publish("master-bedroom-left-window/sheer/state", "open");

  - id: sheer_close
    then:
      - output.turn_on: rs485_de_sheer
      - delay: 5ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x01,0x00,0x01};
          id(uart_sheer).write_array(cmd, 6);
      - delay: 10ms
      - output.turn_off: rs485_de_sheer
      - lambda: |-
          id(sheer_state) = 2;
          id(mqtt_client).publish("master-bedroom-left-window/sheer/state", "closed");

  - id: sheer_stop
    then:
      - output.turn_on: rs485_de_sheer
      - delay: 5ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x02,0x00,0x02};
          id(uart_sheer).write_array(cmd, 6);
      - delay: 10ms
      - output.turn_off: rs485_de_sheer
      - lambda: |-
          id(sheer_state) = 1;
          id(mqtt_client).publish("master-bedroom-left-window/sheer/state", "stopped");

  - id: sheer_toggle
    then:
      - lambda: 'id(sheer_step) = (id(sheer_step) + 1) % 4;'
      - if:
          condition:
            lambda: 'return id(sheer_step) == 0;'
          then:
            - script.execute: sheer_close
      - if:
          condition:
            lambda: 'return id(sheer_step) == 1;'
          then:
            - script.execute: sheer_stop
      - if:
          condition:
            lambda: 'return id(sheer_step) == 2;'
          then:
            - script.execute: sheer_open
      - if:
          condition:
            lambda: 'return id(sheer_step) == 3;'
          then:
            - script.execute: sheer_stop

  - id: curtain_open
    then:
      - output.turn_on: rs485_de_curtain
      - delay: 5ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x03,0x00,0x03};
          id(uart_curtain).write_array(cmd, 6);
      - delay: 10ms
      - output.turn_off: rs485_de_curtain
      - lambda: |-
          id(curtain_state) = 3;
          id(mqtt_client).publish("master-bedroom-left-window/curtain/state", "open");

  - id: curtain_close
    then:
      - output.turn_on: rs485_de_curtain
      - delay: 5ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x01,0x00,0x01};
          id(uart_curtain).write_array(cmd, 6);
      - delay: 10ms
      - output.turn_off: rs485_de_curtain
      - lambda: |-
          id(curtain_state) = 2;
          id(mqtt_client).publish("master-bedroom-left-window/curtain/state", "closed");

  - id: curtain_stop
    then:
      - output.turn_on: rs485_de_curtain
      - delay: 5ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x02,0x00,0x02};
          id(uart_curtain).write_array(cmd, 6);
      - delay: 10ms
      - output.turn_off: rs485_de_curtain
      - lambda: |-
          id(curtain_state) = 1;
          id(mqtt_client).publish("master-bedroom-left-window/curtain/state", "stopped");

  - id: curtain_toggle
    then:
      - lambda: 'id(curtain_step) = (id(curtain_step) + 1) % 4;'
      - if:
          condition:
            lambda: 'return id(curtain_step) == 0;'
          then:
            - script.execute: curtain_close
      - if:
          condition:
            lambda: 'return id(curtain_step) == 1;'
          then:
            - script.execute: curtain_stop
      - if:
          condition:
            lambda: 'return id(curtain_step) == 2;'
          then:
            - script.execute: curtain_open
      - if:
          condition:
            lambda: 'return id(curtain_step) == 3;'
          then:
            - script.execute: curtain_stop