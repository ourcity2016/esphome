# ============================================================
# Master Bedroom Left Window ESPHome Configuration
# Chip: ESP32 | Flash: 4MB
# Pins:
#   UART0: 窗纱电机 RX=16, TX=17, Baud=9600
#   UART1: 窗帘电机 RX=22, TX=23, Baud=9600
# 485协议: STOP=0000020002, OFF=0000010001, ON=0000030003
# 循环逻辑: OFF→STOP→ON→STOP
# MQTT: emqx.eyefang.com:1883
# Home Assistant: 支持 Cover 实体
# ============================================================

esphome:
  name: master-bedroom-left-window
  friendly_name: Master Bedroom Left Window

esp32:
  board: esp32dev
  framework:
    type: esp-idf
  flash_size: 4MB

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "MBLeftWindow"
    password: "12345678"

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

mqtt:
  broker: emqx.eyefang.com
  port: 1883
  username: admin
  password: admin
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: master-bedroom-left-window
  birth_message:
    topic: master-bedroom-left-window/status
    payload: online
  will_message:
    topic: master-bedroom-left-window/status
    payload: offline
  id: mqtt_client
  on_message:
    - topic: master-bedroom-left-window/sheer/set
      then:
        - lambda: |-
            std::string cmd(x);
            ESP_LOGI("MQTT", "Sheer command received: %s", cmd.c_str());
            if (cmd == "ON") {
              id(sheer_open)->execute();
            } else if (cmd == "OFF") {
              id(sheer_close)->execute();
            } else if (cmd == "STOP") {
              id(sheer_stop)->execute();
            } else {
              ESP_LOGW("MQTT", "Unknown sheer command: %s", cmd.c_str());
            }
    - topic: master-bedroom-left-window/curtain/set
      then:
        - lambda: |-
            std::string cmd(x);
            ESP_LOGI("MQTT", "Curtain command received: %s", cmd.c_str());
            if (cmd == "ON") {
              id(curtain_open)->execute();
            } else if (cmd == "OFF") {
              id(curtain_close)->execute();
            } else if (cmd == "STOP") {
              id(curtain_stop)->execute();
            } else {
              ESP_LOGW("MQTT", "Unknown curtain command: %s", cmd.c_str());
            }
    - topic: master-bedroom-left-window/all/set
      then:
        - lambda: |-
            std::string cmd(x);
            ESP_LOGI("MQTT", "All command received: %s", cmd.c_str());
            if (cmd == "ON") {
              id(sheer_open)->execute();
              id(curtain_open)->execute();
            } else if (cmd == "OFF") {
              id(sheer_close)->execute();
              id(curtain_close)->execute();
            } else if (cmd == "STOP") {
              id(sheer_stop)->execute();
              id(curtain_stop)->execute();
            } else {
              ESP_LOGW("MQTT", "Unknown all command: %s", cmd.c_str());
            }
    - topic: master-bedroom-left-window/sheer/toggle
      then:
        - script.execute: sheer_toggle
    - topic: master-bedroom-left-window/curtain/toggle
      then:
        - script.execute: curtain_toggle
    - topic: master-bedroom-left-window/all/toggle
      then:
        - script.execute: sheer_toggle
        - script.execute: curtain_toggle

web_server:
  port: 80

logger:
  level: DEBUG
  baud_rate: 0  # 禁用串口日志，避免干扰UART

# ====== UART + RS485 方向控制 ======
uart:
  - id: uart_sheer
    tx_pin: GPIO16
    rx_pin: GPIO17
    baud_rate: 9600
    data_bits: 8
    stop_bits: 1
    parity: NONE
    debug:
      direction: BOTH
      after:
        delimiter: "\n"
      sequence:
        - lambda: |-
            UARTDebug::log_hex(direction, bytes, ' ');

  - id: uart_curtain
    tx_pin: GPIO23
    rx_pin: GPIO22
    baud_rate: 9600
    data_bits: 8
    stop_bits: 1
    parity: NONE
    debug:
      direction: BOTH
      after:
        delimiter: "\n"
      sequence:
        - lambda: |-
            UARTDebug::log_hex(direction, bytes, ' ');

# RS485 方向控制引脚 (DE/RE)
output:
  - platform: gpio
    pin: GPIO5
    id: rs485_de_sheer

  - platform: gpio
    pin: GPIO18
    id: rs485_de_curtain

# ====== Globals ======
globals:
  - id: sheer_state
    type: int
    restore_value: false
    initial_value: '1'
  - id: curtain_state
    type: int
    restore_value: false
    initial_value: '1'
  - id: sheer_step
    type: int
    restore_value: false
    initial_value: '0'
  - id: curtain_step
    type: int
    restore_value: false
    initial_value: '0'

# ====== Switch ======
switch:
  - platform: restart
    name: "S1-Restart Device"
    id: device_restart
  - platform: safe_mode
    name: "S2-Safe Mode"
  - platform: template
    name: "S3-Test Sheer ON"
    turn_on_action:
      - script.execute: sheer_open
  - platform: template
    name: "S4-Test Sheer OFF"
    turn_on_action:
      - script.execute: sheer_close
  - platform: template
    name: "S5-Test Sheer STOP"
    turn_on_action:
      - script.execute: sheer_stop
  - platform: template
    name: "S6-Test Curtain ON"
    turn_on_action:
      - script.execute: curtain_open
  - platform: template
    name: "S7-Test Curtain OFF"
    turn_on_action:
      - script.execute: curtain_close
  - platform: template
    name: "S8-Test Curtain STOP"
    turn_on_action:
      - script.execute: curtain_stop

# ====== Cover (HA 窗帘实体) ======
cover:
  - platform: template
    name: "C1-Sheer"
    id: sheer_cover
    device_class: curtain
    optimistic: true
    assumed_state: true
    open_action:
      - script.execute: sheer_open
    close_action:
      - script.execute: sheer_close
    stop_action:
      - script.execute: sheer_stop

  - platform: template
    name: "C2-Curtain"
    id: curtain_cover
    device_class: curtain
    optimistic: true
    assumed_state: true
    open_action:
      - script.execute: curtain_open
    close_action:
      - script.execute: curtain_close
    stop_action:
      - script.execute: curtain_stop

# ====== Sensors ======
sensor:
  - platform: wifi_signal
    name: "T1-WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "T2-Uptime"
    update_interval: 60s

# ====== Text Sensors ======
text_sensor:
  - platform: template
    name: "T3-Sheer State"
    id: sheer_status_text
    lambda: |-
      switch (id(sheer_state)) {
        case 1: return {"Stopped"};
        case 2: return {"Closed"};
        case 3: return {"Open"};
        default: return {"Unknown"};
      }
    update_interval: 1s
  - platform: template
    name: "T4-Curtain State"
    id: curtain_status_text
    lambda: |-
      switch (id(curtain_state)) {
        case 1: return {"Stopped"};
        case 2: return {"Closed"};
        case 3: return {"Open"};
        default: return {"Unknown"};
      }
    update_interval: 1s

# ====== Scripts (485写入: 拉高DE → 写数据 → 等待发送完成 → 拉低DE) ======
script:
  - id: sheer_open
    then:
      - lambda: |-
          ESP_LOGI("SHEER", "Opening sheer...");
      - output.turn_on: rs485_de_sheer
      - delay: 10ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x03,0x00,0x03};
          id(uart_sheer).write_array(cmd, 6);
          id(uart_sheer).flush();
          ESP_LOGI("SHEER", "Sent OPEN command: %02X %02X %02X %02X %02X %02X", 
                   cmd[0], cmd[1], cmd[2], cmd[3], cmd[4], cmd[5]);
      - delay: 20ms
      - output.turn_off: rs485_de_sheer
      - lambda: |-
          id(sheer_state) = 3;
          id(mqtt_client).publish("master-bedroom-left-window/sheer/state", "open");

  - id: sheer_close
    then:
      - lambda: |-
          ESP_LOGI("SHEER", "Closing sheer...");
      - output.turn_on: rs485_de_sheer
      - delay: 10ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x01,0x00,0x01};
          id(uart_sheer).write_array(cmd, 6);
          id(uart_sheer).flush();
          ESP_LOGI("SHEER", "Sent CLOSE command: %02X %02X %02X %02X %02X %02X", 
                   cmd[0], cmd[1], cmd[2], cmd[3], cmd[4], cmd[5]);
      - delay: 20ms
      - output.turn_off: rs485_de_sheer
      - lambda: |-
          id(sheer_state) = 2;
          id(mqtt_client).publish("master-bedroom-left-window/sheer/state", "closed");

  - id: sheer_stop
    then:
      - lambda: |-
          ESP_LOGI("SHEER", "Stopping sheer...");
      - output.turn_on: rs485_de_sheer
      - delay: 10ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x02,0x00,0x02};
          id(uart_sheer).write_array(cmd, 6);
          id(uart_sheer).flush();
          ESP_LOGI("SHEER", "Sent STOP command: %02X %02X %02X %02X %02X %02X", 
                   cmd[0], cmd[1], cmd[2], cmd[3], cmd[4], cmd[5]);
      - delay: 20ms
      - output.turn_off: rs485_de_sheer
      - lambda: |-
          id(sheer_state) = 1;
          id(mqtt_client).publish("master-bedroom-left-window/sheer/state", "stopped");

  - id: sheer_toggle
    then:
      - lambda: 'id(sheer_step) = (id(sheer_step) + 1) % 4;'
      - if:
          condition:
            lambda: 'return id(sheer_step) == 0;'
          then:
            - script.execute: sheer_close
      - if:
          condition:
            lambda: 'return id(sheer_step) == 1;'
          then:
            - script.execute: sheer_stop
      - if:
          condition:
            lambda: 'return id(sheer_step) == 2;'
          then:
            - script.execute: sheer_open
      - if:
          condition:
            lambda: 'return id(sheer_step) == 3;'
          then:
            - script.execute: sheer_stop

  - id: curtain_open
    then:
      - lambda: |-
          ESP_LOGI("CURTAIN", "Opening curtain...");
      - output.turn_on: rs485_de_curtain
      - delay: 10ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x03,0x00,0x03};
          id(uart_curtain).write_array(cmd, 6);
          id(uart_curtain).flush();
          ESP_LOGI("CURTAIN", "Sent OPEN command: %02X %02X %02X %02X %02X %02X", 
                   cmd[0], cmd[1], cmd[2], cmd[3], cmd[4], cmd[5]);
      - delay: 20ms
      - output.turn_off: rs485_de_curtain
      - lambda: |-
          id(curtain_state) = 3;
          id(mqtt_client).publish("master-bedroom-left-window/curtain/state", "open");

  - id: curtain_close
    then:
      - lambda: |-
          ESP_LOGI("CURTAIN", "Closing curtain...");
      - output.turn_on: rs485_de_curtain
      - delay: 10ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x01,0x00,0x01};
          id(uart_curtain).write_array(cmd, 6);
          id(uart_curtain).flush();
          ESP_LOGI("CURTAIN", "Sent CLOSE command: %02X %02X %02X %02X %02X %02X", 
                   cmd[0], cmd[1], cmd[2], cmd[3], cmd[4], cmd[5]);
      - delay: 20ms
      - output.turn_off: rs485_de_curtain
      - lambda: |-
          id(curtain_state) = 2;
          id(mqtt_client).publish("master-bedroom-left-window/curtain/state", "closed");

  - id: curtain_stop
    then:
      - lambda: |-
          ESP_LOGI("CURTAIN", "Stopping curtain...");
      - output.turn_on: rs485_de_curtain
      - delay: 10ms
      - lambda: |-
          uint8_t cmd[6] = {0x00,0x00,0x00,0x02,0x00,0x02};
          id(uart_curtain).write_array(cmd, 6);
          id(uart_curtain).flush();
          ESP_LOGI("CURTAIN", "Sent STOP command: %02X %02X %02X %02X %02X %02X", 
                   cmd[0], cmd[1], cmd[2], cmd[3], cmd[4], cmd[5]);
      - delay: 20ms
      - output.turn_off: rs485_de_curtain
      - lambda: |-
          id(curtain_state) = 1;
          id(mqtt_client).publish("master-bedroom-left-window/curtain/state", "stopped");

  - id: curtain_toggle
    then:
      - lambda: 'id(curtain_step) = (id(curtain_step) + 1) % 4;'
      - if:
          condition:
            lambda: 'return id(curtain_step) == 0;'
          then:
            - script.execute: curtain_close
      - if:
          condition:
            lambda: 'return id(curtain_step) == 1;'
          then:
            - script.execute: curtain_stop
      - if:
          condition:
            lambda: 'return id(curtain_step) == 2;'
          then:
            - script.execute: curtain_open
      - if:
          condition:
            lambda: 'return id(curtain_step) == 3;'
          then:
            - script.execute: curtain_stop